type ConflictError {
  message: String!
  status: Int!
}

type CouponType {
  createdAt: DateTime!
  id: ID!
  key: String!
  label: String!
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type Deal {
  category: String
  code: String
  couponType: CouponType
  couponTypeId: ID
  createdAt: DateTime!
  currency: String
  discountPct: Float
  discountText: String
  expiresAt: DateTime
  id: ID!
  item: String
  merchant: Merchant!
  price: Float
  startsAt: DateTime
  title: String!
  url: String
}

type LocationLookupError {
  message: String!
  status: Int!
}

type LocationNotConfiguredError {
  message: String!
  status: Int!
}

type LocationNotFoundError {
  message: String!
  status: Int!
}

type Merchant {
  address: String
  createdAt: DateTime!
  id: ID!
  lat: Float
  lng: Float
  name: String!
}

type Mutation {
  addNewsletter(merchantId: ID!, name: String!, recommended: Boolean = false, signupUrl: String!): MutationAddNewsletterResult!
  addPref(kind: PrefKind!, scope: PrefScope!, value: String!): TrackingPref!
  removeNewsletter(id: ID!): MutationRemoveNewsletterResult!
  removePref(id: ID!): Boolean!
}

union MutationAddNewsletterResult = MutationAddNewsletterSuccess | NotFoundError | ServerError | ValidationError

type MutationAddNewsletterSuccess {
  data: Newsletter!
}

union MutationRemoveNewsletterResult = MutationRemoveNewsletterSuccess | NotFoundError | ServerError

type MutationRemoveNewsletterSuccess {
  data: Newsletter!
}

type NearbyDealGroup {
  couponType: CouponType
  deals: [Deal!]!
}

type Newsletter {
  id: ID!
  merchantId: ID!
  name: String!
  recommended: Boolean!
  signupUrl: String!
}

type NotFoundError {
  message: String!
  status: Int!
}

enum PrefKind {
  MUTE
  WATCHLIST
}

enum PrefScope {
  CATEGORY
  ITEM
}

type Query {
  deal(id: ID!): QueryDealResult!
  deals(activeOnly: Boolean = true, category: String): [Deal!]!
  dealsNearMe(radiusMiles: Float = 25): QueryDealsNearMeResult!
  getCouponTypes: [CouponType!]!
  newsletter(id: ID!): QueryNewsletterResult!
  prefs: [TrackingPref!]!
  recommendedNewsletters(radiusMiles: Float = 25): QueryRecommendedNewslettersResult!
  stats: Stats!
  storesNearLocation(lat: Float!, lng: Float!, radiusMiles: Float!): QueryStoresNearLocationResult!
  storesNearMe(radiusMiles: Float = 25): QueryStoresNearMeResult!
}

union QueryDealResult = NotFoundError | QueryDealSuccess | ServerError

type QueryDealSuccess {
  data: Deal!
}

union QueryDealsNearMeResult = LocationLookupError | LocationNotConfiguredError | LocationNotFoundError | QueryDealsNearMeSuccess | ServerError | ValidationError

type QueryDealsNearMeSuccess {
  data: [NearbyDealGroup!]!
}

union QueryNewsletterResult = NotFoundError | QueryNewsletterSuccess | ServerError

type QueryNewsletterSuccess {
  data: Newsletter!
}

union QueryRecommendedNewslettersResult = LocationLookupError | LocationNotConfiguredError | LocationNotFoundError | QueryRecommendedNewslettersSuccess | ServerError | ValidationError

type QueryRecommendedNewslettersSuccess {
  data: [Newsletter!]!
}

union QueryStoresNearLocationResult = QueryStoresNearLocationSuccess | ServerError | ValidationError

type QueryStoresNearLocationSuccess {
  data: [Store!]!
}

union QueryStoresNearMeResult = LocationLookupError | LocationNotConfiguredError | LocationNotFoundError | QueryStoresNearMeSuccess | ServerError | ValidationError

type QueryStoresNearMeSuccess {
  data: [Store!]!
}

type ServerError {
  message: String!
  status: Int!
}

type Stats {
  activeDeals: Int!
  lastIngestAt: DateTime
  merchants: Int!
  totalDeals: Int!
}

type Store {
  address: String
  distanceMiles: Float!
  id: ID!
  lat: Float!
  lng: Float!
  name: String!
}

type TrackingPref {
  createdAt: DateTime!
  id: ID!
  kind: PrefKind!
  scope: PrefScope!
  value: String!
}

type ValidationError {
  message: String!
  status: Int!
}
