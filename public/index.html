<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MealDeal</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; background: Canvas; color: CanvasText; }
  header { padding: .9rem 1rem; border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent); }
  header h1 { font-size: 1.1rem; margin: 0; }
  header p { margin: .2rem 0 0; opacity: .6; font-size: .85rem; }
  main { max-width: 860px; margin: 0 auto; padding: 1rem; }
  .deal { border: 1px solid color-mix(in srgb, CanvasText 15%, transparent); border-radius: 10px; padding: .7rem .9rem; margin: .5rem 0; }
  .deal .top { display: flex; justify-content: space-between; gap: .5rem; }
  .deal .merchant { font-weight: 600; }
  .deal .disc { font-weight: 600; }
  .deal .meta { opacity: .65; font-size: .82rem; margin-top: .2rem; }
  .deal code { background: color-mix(in srgb, CanvasText 12%, transparent); padding: .05rem .3rem; border-radius: 4px; }
  button { border: 0; border-radius: 6px; padding: .25rem .5rem; background: color-mix(in srgb, CanvasText 15%, transparent); color: CanvasText; cursor: pointer; font-size: .8rem; }
  .empty { opacity: .6; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>🥕 MealDeal</h1>
  <p>Grocery deals from your newsletters. <span id="count"></span></p>
</header>
<main>
  <div id="deals"></div>
  <!-- TODO(local AI): richer UI — filters/search, watchlist, category grouping, expiry sort,
       and (later) the weekly-recipes view. This is a working stub over /api/deals + /api/prefs. -->
</main>

<script>
async function load() {
  const deals = await fetch('/api/deals').then(r => r.json()).catch(() => []);
  document.getElementById('count').textContent = deals.length ? `${deals.length} active` : '';
  const box = document.getElementById('deals');
  if (!deals.length) { box.innerHTML = '<div class="empty">No active deals yet. The agent adds them as newsletters arrive.</div>'; return; }
  box.innerHTML = '';
  for (const d of deals) {
    const el = document.createElement('div');
    el.className = 'deal';
    const disc = d.discountText || (d.discountPct != null ? d.discountPct + '% off' : '');
    const bits = [d.category, d.code ? 'code ' : null].filter(Boolean);
    el.innerHTML =
      `<div class="top"><span class="merchant"></span><span class="disc"></span></div>
       <div class="title"></div>
       <div class="meta"><span class="cat"></span> <span class="code"></span> <span class="exp"></span></div>
       <div style="margin-top:.4rem"><button class="mute">stop tracking this</button></div>`;
    el.querySelector('.merchant').textContent = d.merchant || 'Unknown';
    el.querySelector('.disc').textContent = disc;
    el.querySelector('.title').textContent = d.title || '';
    el.querySelector('.cat').textContent = d.category ? `#${d.category}` : '';
    if (d.code) { const c = document.createElement('code'); c.textContent = d.code; el.querySelector('.code').appendChild(c); }
    el.querySelector('.exp').textContent = d.expiresAt ? `· expires ${d.expiresAt}` : '';
    el.querySelector('.mute').onclick = async () => {
      const scope = d.item ? 'item' : 'category';
      const value = d.item || d.category;
      if (!value) return;
      await fetch('/api/prefs', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kind: 'mute', scope, value }) });
      load();
    };
    box.appendChild(el);
  }
}
load();
</script>
</body>
</html>
