# One container: SPA + GraphQL API + in-process ingest worker. SQLite lives on a volume.
# Copy .env.example to .env and fill in your inbox + LLM before `docker compose up`.
services:
  mealdeal:
    build: .
    image: mealdeal
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: file:/data/mealdeal.db
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_SECURE: ${IMAP_SECURE:-true}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_MAILBOX: ${IMAP_MAILBOX:-INBOX}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      GEOCODER_BASE_URL: ${GEOCODER_BASE_URL:-https://nominatim.openstreetmap.org}
      GEOCODER_USER_AGENT: ${GEOCODER_USER_AGENT:-MealDeal/0.1 (+https://github.com/marchah/mealdeal)}
      INGEST_CRON: ${INGEST_CRON:-*/30 * * * *}
      INGEST_BATCH: ${INGEST_BATCH:-25}
      INGEST_TOKEN: ${INGEST_TOKEN:-}
      INGEST_SOURCE: ${INGEST_SOURCE:-imap}
      INGEST_LOCAL_DIR: ${INGEST_LOCAL_DIR:-}
      INGEST_ARCHIVE_DIR: ${INGEST_ARCHIVE_DIR:-}
      USER_LOCATION: ${USER_LOCATION:-}
    volumes:
      - mealdeal-data:/data
    restart: unless-stopped

volumes:
  mealdeal-data:
